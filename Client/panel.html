<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Inspector</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --bg-panel: #252526;
      --bg-row: #1e1e1e;
      --bg-row-hover: #2a2d2e;
      --bg-row-selected: #094771;
      --bg-header: #2d2d30;
      --bg-detail: #252526;
      --bg-input: #3c3c3c;
      --border: #3c3c3c;
      --border-light: #454545;
      --text: #cccccc;
      --text-dim: #858585;
      --text-bright: #ffffff;
      --text-url: #9cdcfe;
      --accent: #4fc3f7;
      --accent-dim: #2d7eae;
      --green: #4ec9b0;
      --red: #f44747;
      --orange: #ce9178;
      --yellow: #dcdcaa;
      --purple: #c586c0;
      --method-get: #4ec9b0;
      --method-post: #4fc3f7;
      --method-put: #dcdcaa;
      --method-patch: #ce9178;
      --method-delete: #f44747;
      --status-2xx: #4ec9b0;
      --status-3xx: #4fc3f7;
      --status-4xx: #f44747;
      --status-5xx: #f44747;
      --font-mono: 'Consolas', 'Courier New', monospace;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --toolbar-h: 36px;
      --filter-h: 30px;
      --header-h: 28px;
      --row-h: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 11px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #toolbar {
      height: var(--toolbar-h);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      flex-shrink: 0;
    }

    .toolbar-btn {
      width: 24px; height: 24px;
      border: none; background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .toolbar-btn:hover { background: var(--bg-input); color: var(--text); }
    .toolbar-btn.active { color: var(--red); }
    .toolbar-btn svg { width: 14px; height: 14px; }

    .toolbar-sep {
      width: 1px; height: 18px;
      background: var(--border-light);
      margin: 0 2px;
    }

    #search-input {
      height: 22px;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 11px;
      padding: 0 8px;
      width: 180px;
      outline: none;
    }
    #search-input:focus { border-color: var(--accent-dim); }
    #search-input::placeholder { color: var(--text-dim); }

    .method-filter {
      display: flex; gap: 2px;
    }
    .method-btn {
      height: 20px;
      padding: 0 8px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-dim);
      font-size: 10px;
      font-family: var(--font-ui);
      font-weight: 600;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.1s;
      letter-spacing: 0.3px;
    }
    .method-btn:hover { background: var(--bg-input); color: var(--text); }
    .method-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text-bright); }

    .toolbar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
    }

    #ws-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--text-dim);
    }
    #ws-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    #ws-dot.connected { background: var(--green); }
    #ws-dot.connecting {
      background: var(--yellow);
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #request-count {
      font-size: 10px;
      color: var(--text-dim);
      padding: 0 6px;
    }

    #port-control {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .port-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #port-input {
      width: 58px;
      height: 22px;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 0 6px;
      outline: none;
      text-align: right;
      -moz-appearance: textfield;
    }
    #port-input:focus { border-color: var(--accent-dim); }
    #port-input::-webkit-inner-spin-button,
    #port-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    #filter-bar {
      height: var(--filter-h);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
      flex-shrink: 0;
    }

    .type-chip {
      height: 18px;
      padding: 0 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-size: 10px;
      font-family: var(--font-ui);
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.1s;
    }
    .type-chip:hover { background: var(--bg-input); color: var(--text); }
    .type-chip.active {
      background: var(--bg-row-selected);
      border-color: var(--accent-dim);
      color: var(--text-bright);
    }

    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #requests-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #table-header {
      height: var(--header-h);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 28px 56px 60px minmax(200px,1fr) 70px 80px 60px 60px;
      align-items: center;
      flex-shrink: 0;
    }
    .th {
      padding: 0 6px;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
    }
    .th:hover { color: var(--text); }

    #requests-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #requests-list::-webkit-scrollbar { width: 8px; }
    #requests-list::-webkit-scrollbar-track { background: var(--bg); }
    #requests-list::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

    .request-row {
      height: var(--row-h);
      display: grid;
      grid-template-columns: 28px 56px 60px minmax(200px,1fr) 70px 80px 60px 60px;
      align-items: center;
      border-bottom: 1px solid rgba(60,60,60,0.5);
      cursor: pointer;
      transition: background 0.05s;
      animation: rowIn 0.15s ease;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .request-row:hover { background: var(--bg-row-hover); }
    .request-row.selected { background: var(--bg-row-selected); }
    .request-row.error .td-url { color: var(--red); }

    .td {
      padding: 0 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
    }
    .td-index { color: var(--text-dim); font-size: 10px; text-align: center; }
    .td-method {
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.3px;
    }
    .td-status { font-weight: 600; }
    .td-url { color: var(--text-url); }
    .td-type { color: var(--text-dim); font-size: 10px; }
    .td-initiator { color: var(--text-dim); font-size: 10px; }
    .td-size { text-align: right; color: var(--text-dim); font-size: 10px; }
    .td-time { text-align: right; color: var(--text-dim); font-size: 10px; }

    .method-get { color: var(--method-get); }
    .method-post { color: var(--method-post); }
    .method-put { color: var(--method-put); }
    .method-patch { color: var(--method-patch); }
    .method-delete { color: var(--method-delete); }

    .status-2xx { color: var(--status-2xx); }
    .status-3xx { color: var(--status-3xx); }
    .status-4xx { color: var(--status-4xx); }
    .status-5xx { color: var(--status-5xx); }
    .status-0 { color: var(--text-dim); }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-dim);
    }
    #empty-state svg { opacity: 0.3; }
    #empty-state .empty-title { font-size: 13px; color: var(--text); }
    #empty-state .empty-sub { font-size: 11px; text-align: center; line-height: 1.6; max-width: 280px; }

    #detail-panel {
      width: 420px;
      min-width: 280px;
      max-width: 60%;
      background: var(--bg-detail);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #detail-panel.visible { display: flex; }

    #detail-header {
      height: var(--toolbar-h);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      flex-shrink: 0;
    }
    #detail-close {
      width: 20px; height: 20px;
      border: none; background: transparent;
      color: var(--text-dim); cursor: pointer;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1;
    }
    #detail-close:hover { background: var(--bg-input); color: var(--text); }
    #detail-title {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    #detail-tabs {
      display: flex;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .detail-tab {
      padding: 0 12px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-family: var(--font-ui);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.1s;
    }
    .detail-tab:hover { color: var(--text); }
    .detail-tab.active {
      color: var(--text-bright);
      border-bottom-color: var(--accent);
    }

    #detail-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #detail-body::-webkit-scrollbar { width: 8px; }
    #detail-body::-webkit-scrollbar-track { background: var(--bg-detail); }
    #detail-body::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

    .tab-content { display: none; padding: 0; }
    .tab-content.active { display: block; }

    .section {
      border-bottom: 1px solid var(--border);
    }
    .section-header {
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-header);
      user-select: none;
    }
    .section-header:hover { color: var(--text); }
    .section-arrow {
      font-size: 9px;
      transition: transform 0.15s;
      display: inline-block;
    }
    .section.collapsed .section-arrow { transform: rotate(-90deg); }
    .section.collapsed .section-body { display: none; }
    .section-body { padding: 4px 0; }

    .kv-row {
      display: flex;
      padding: 2px 12px;
      gap: 0;
      min-height: 18px;
    }
    .kv-row:hover { background: var(--bg-row-hover); }
    .kv-key {
      color: var(--text-dim);
      min-width: 140px;
      max-width: 140px;
      font-family: var(--font-mono);
      font-size: 10px;
      padding-right: 8px;
      word-break: break-all;
      flex-shrink: 0;
    }
    .kv-value {
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10px;
      word-break: break-all;
      flex: 1;
    }
    .kv-value.status-2xx { color: var(--status-2xx); }
    .kv-value.status-4xx { color: var(--status-4xx); }
    .kv-value.status-5xx { color: var(--status-5xx); }

    .json-viewer {
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
    }
    .json-key { color: var(--text-url); }
    .json-string { color: var(--orange); }
    .json-number { color: var(--green); }
    .json-bool { color: var(--purple); }
    .json-null { color: var(--text-dim); }

    #statusbar {
      height: 20px;
      background: var(--bg-header);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      flex-shrink: 0;
    }
    .stat {
      font-size: 10px;
      color: var(--text-dim);
    }
    .stat span { color: var(--text); font-weight: 600; }

    #resize-handle {
      width: 4px;
      background: transparent;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    #resize-handle:hover { background: var(--accent-dim); }

    .waterfall-bar {
      height: 10px;
      background: var(--accent-dim);
      border-radius: 2px;
      min-width: 2px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      font-size: 10px;
      font-family: var(--font-ui);
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      color: var(--text-dim);
      border-radius: 3px;
      cursor: pointer;
      margin: 6px 12px;
    }
    .copy-btn:hover { background: var(--bg-row-hover); color: var(--text); }
  </style>
</head>
<body>

<div id="toolbar">
  <button class="toolbar-btn active" id="btn-record" title="Recording">
    <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="5"/></svg>
  </button>
  <button class="toolbar-btn" id="btn-clear" title="Clear">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 3l10 10M13 3L3 13"/>
    </svg>
  </button>

  <div class="toolbar-sep"></div>

  <input id="search-input" type="text" placeholder="Filter requests..." />

  <div class="toolbar-sep"></div>

  <div class="method-filter">
    <button class="method-btn active" data-method="ALL">All</button>
    <button class="method-btn" data-method="GET">GET</button>
    <button class="method-btn" data-method="POST">POST</button>
    <button class="method-btn" data-method="PUT">PUT</button>
    <button class="method-btn" data-method="PATCH">PATCH</button>
    <button class="method-btn" data-method="DELETE">DELETE</button>
  </div>

  <div class="toolbar-right">
    <span id="request-count">0 requests</span>
    <div id="port-control" title="WebSocket port of the inspector server (press Enter to connect)">
      <span class="port-label">Port</span>
      <input id="port-input" type="number" min="1" max="65535" step="1" value="9119" />
    </div>
    <div id="ws-status">
      <div id="ws-dot" class="connecting"></div>
      <span id="ws-label">Connecting…</span>
    </div>
  </div>
</div>

<div id="filter-bar">
  <button class="type-chip active" data-type="All">All</button>
  <button class="type-chip" data-type="fetch">Fetch</button>
  <button class="type-chip" data-type="http">HTTP</button>
  <button class="type-chip" data-type="middleware">Middleware</button>
  <button class="type-chip" data-type="manual">Manual</button>
</div>

<div id="main">
  <div id="requests-pane">
    <div id="table-header">
      <div class="th">#</div>
      <div class="th">Method</div>
      <div class="th">Status</div>
      <div class="th">URL</div>
      <div class="th">Type</div>
      <div class="th">Initiator</div>
      <div class="th" style="text-align:right">Size</div>
      <div class="th" style="text-align:right">Time</div>
    </div>
    <div id="requests-list">
      <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="12" width="36" height="26" rx="3" stroke="#666" stroke-width="2"/>
          <path d="M6 18h36" stroke="#666" stroke-width="2"/>
          <path d="M14 24h6M14 29h10M14 34h8" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <div class="empty-title">No server requests recorded</div>
        <div class="empty-sub">Make sure the Next.js Server Inspector package is running on your server, then make some API calls.</div>
      </div>
    </div>
  </div>

  <div id="resize-handle"></div>

  <div id="detail-panel">
    <div id="detail-header">
      <button id="detail-close">✕</button>
      <div id="detail-title">Request Details</div>
    </div>

    <div id="detail-tabs">
      <button class="detail-tab active" data-tab="overview">Overview</button>
      <button class="detail-tab" data-tab="req-headers">Request Headers</button>
      <button class="detail-tab" data-tab="res-headers">Response Headers</button>
      <button class="detail-tab" data-tab="payload">Payload</button>
      <button class="detail-tab" data-tab="response">Response</button>
    </div>

    <div id="detail-body">
      <div class="tab-content active" id="tab-overview"></div>
      <div class="tab-content" id="tab-req-headers"></div>
      <div class="tab-content" id="tab-res-headers"></div>
      <div class="tab-content" id="tab-payload"></div>
      <div class="tab-content" id="tab-response"></div>
    </div>
  </div>
</div>

<div id="statusbar">
  <div class="stat"><span id="stat-total">0</span> requests</div>
  <div class="stat">Total time: <span id="stat-time">0ms</span></div>
  <div class="stat">Transferred: <span id="stat-size">0 B</span></div>
  <div class="stat" id="stat-errors" style="color: var(--red); display:none">
    <span id="stat-err-count">0</span> errors
  </div>
</div>

<script src="panel.js"></script>
</body>
</html>
